server {
    listen 4300;
    server_name _;

    # Root untuk Angular app (base-href /ak/)
    location /ak/ {
        alias /usr/share/nginx/html/ak/;
        try_files $uri $uri/ /ak/index.html;
        index index.html;
    }

    # Redirect root ke /ak/
    location = / {
        return 301 /ak/;
    }

    # Proxy API ke backend Spring Boot yang berjalan di server (bukan Docker)
    location /absensikerja/ {
        proxy_pass http://host.docker.internal:8092/absensikerja/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;

        # Upload file size
        client_max_body_size 20M;
    }


    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1000;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
}
